name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/aisep/repo/AISEP-Capstone-FE
            git fetch origin main
            git reset --hard origin/main
            cd /var/www/aisep/repo
            docker compose up -d --build --no-deps frontend
            echo "Waiting for frontend to start..."
            for i in {1..20}; do
              sleep 5
              STATUS=$(curl -so /dev/null -w '%{http_code}' https://aisep.xyz/ 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "âœ… Frontend is healthy (HTTP $STATUS)"
                exit 0
              fi
              echo "  attempt $i/20 (HTTP $STATUS)..."
            done
            echo "❌ Frontend health check failed"
            docker logs repo-frontend-1 --tail 50
            exit 1
