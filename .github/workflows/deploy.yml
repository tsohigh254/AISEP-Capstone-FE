name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/aisep/repo/AISEP-Capstone-FE
            git fetch origin main
            git reset --hard origin/main
            cd /var/www/aisep/repo
            docker compose up -d --build --no-deps frontend
            
            echo "Waiting 20s for Next.js to fully boot inside container..."
            sleep 20
            
            echo "Reloading reverse proxy to pick up new container IP..."
            # Find the nginx/proxy container dynamically and reload its config
            NGINX_CTR=$(docker ps --format '{{.Names}}' | grep -iE 'nginx|proxy|caddy|traefik' | grep -v frontend | head -1)
            if [ -n "$NGINX_CTR" ]; then
              echo "  Found proxy container: $NGINX_CTR"
              docker exec "$NGINX_CTR" nginx -s reload 2>/dev/null \
                || docker exec "$NGINX_CTR" sh -c 'kill -HUP 1' 2>/dev/null \
                || docker restart "$NGINX_CTR" 2>/dev/null \
                || true
            else
              echo "  No proxy container found, skipping reload"
            fi
            
            echo "Checking frontend health..."
            for i in {1..4}; do
              sleep 5
              STATUS=$(curl -m 10 -so /dev/null -w '%{http_code}' https://aisep.xyz/ 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Frontend is healthy (HTTP $STATUS)"
                exit 0
              fi
              echo "  attempt $i/4 (HTTP $STATUS)..."
            done
            echo "❌ Frontend health check failed"
            docker logs repo-frontend-1 --tail 50
            exit 1
